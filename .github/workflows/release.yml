name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    permissions:
      actions: write
      contents: write
      pull-requests: write
      id-token: write
    uses: SylphxAI/.github/.github/workflows/release.yml@main
    with:
      prebuild: bun run build
      postpublish: |
        # NAPI publish is delegated to napi.yml.
        # Main is merge-queue protected — do NOT try to commit version sync here.
        # Keep crates/gust-napi package versions on main via PR before release
        # (or accept publish at the currently committed napi version).
        NAPI_VERSION=$(jq -r .version crates/gust-napi/package.json)
        GUST_VERSION=$(jq -r .version packages/gust/package.json)
        echo "Dispatching NAPI publish for committed version $NAPI_VERSION (gust meta $GUST_VERSION)"
        if [ "$NAPI_VERSION" != "$GUST_VERSION" ]; then
          echo "::warning::NAPI version ($NAPI_VERSION) != @sylphx/gust ($GUST_VERSION). Publish will use committed NAPI version. Bump crates/gust-napi via PR to realign."
        fi
        gh workflow run napi.yml -f publish=true
    secrets: inherit
