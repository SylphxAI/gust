name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    permissions:
      actions: write
      contents: write
      pull-requests: write
      id-token: write
    uses: SylphxAI/.github/.github/workflows/release.yml@main
    with:
      prebuild: bun run build
      postpublish: |
        # Durable NAPI version sync: commit package versions onto main, then trigger publish.
        # Ephemeral workspace edits alone are insufficient — workflow_dispatch checks out clean main.
        VERSION=$(jq -r .version packages/gust/package.json)
        echo "Syncing NAPI packages to version $VERSION"

        cd crates/gust-napi
        jq --arg v "$VERSION" '.version = $v | .optionalDependencies = (.optionalDependencies | with_entries(.value = $v))' package.json > tmp.json && mv tmp.json package.json

        for dir in npm/*/; do
          if [ -f "$dir/package.json" ]; then
            jq --arg v "$VERSION" '.version = $v' "$dir/package.json" > tmp.json && mv tmp.json "$dir/package.json"
            echo "Updated $dir to version $VERSION"
          fi
        done
        cd ../..

        if git diff --quiet -- crates/gust-napi; then
          echo "NAPI packages already at $VERSION; dispatching publish from current main"
          gh workflow run napi.yml -f publish=true
        else
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/gust-napi
          # [publish-napi] activates publish job on main push (see napi.yml if: condition)
          git commit -m "chore(napi): sync versions to $VERSION [publish-napi]"
          git push origin HEAD:main
        fi
    secrets: inherit
